version: "3.9"

services:
  postgres:
    image: postgres:17-alpine
    container_name: mening_oilam_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: meningoilam
      POSTGRES_USER: mouser
      POSTGRES_PASSWORD: mopassword
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mouser -d meningoilam"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./backend
      dockerfile: src/MeningOilam.Api/Dockerfile
    container_name: mening_oilam_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:5080
      ConnectionStrings__Default: "Host=postgres;Port=5432;Database=meningoilam;Username=mouser;Password=mopassword;Pooling=true;Maximum Pool Size=40;Command Timeout=30"
      Jwt__Secret: "CHANGE_ME_USE_A_64_CHAR_RANDOM_STRING_IN_PRODUCTION"
      Jwt__Issuer: "MeningOilam"
      Jwt__Audience: "MeningOilamClient"
      Telegram__BotToken: "${TELEGRAM_BOT_TOKEN}"
      Telegram__BotUsername: "${TELEGRAM_BOT_USERNAME}"
      Cors__AllowedOrigins__0: "${FRONTEND_URL:-http://localhost:3000}"
      Seed__SuperadminEmail: "${SUPERADMIN_EMAIL:-admin@example.com}"
      Seed__SuperadminPassword: "${SUPERADMIN_PASSWORD:-Admin123!}"
    ports:
      - "5080:5080"
    volumes:
      - uploads:/app/wwwroot/uploads

volumes:
  pgdata:
  uploads:
